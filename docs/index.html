<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>競輪レース結果</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --ink: #20242a;
      --muted: #657080;
      --line: #dce1e8;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-soft: #e3f4f1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    header.page {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 20px;
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 14px;
      font-size: 28px;
      letter-spacing: 0;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fbfcfd;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }
    .metric strong {
      display: block;
      margin-top: 2px;
      font-size: 20px;
    }
    main {
      padding: 20px;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .toolbar input {
      width: min(360px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 14px;
    }
    .race {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .empty {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
    }
    .empty h2 {
      margin: 0 0 6px;
      font-size: 18px;
      letter-spacing: 0;
    }
    .empty p {
      margin: 0;
      color: var(--muted);
    }
    .race-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--accent-soft);
    }
    .race-header h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }
    .race-header p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }
    .race-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      margin-top: 8px;
      color: var(--ink);
      font-size: 12px;
    }
    .race-meta b {
      margin-right: 4px;
      color: var(--muted);
    }
    .race-header a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }
    .tables {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.8fr);
      gap: 16px;
      padding: 16px;
    }
    .race-comment {
      margin: 0;
      padding: 0 16px 16px;
      color: var(--muted);
      font-size: 13px;
    }
    h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 7px 8px;
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-weight: 700;
      background: #fafbfc;
    }
    @media (max-width: 760px) {
      .summary { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .toolbar { align-items: stretch; flex-direction: column; }
      .tables { grid-template-columns: 1fr; overflow-x: auto; }
      table { min-width: 620px; }
    }
  </style>
</head>
<body>
  <header class="page">
    <div class="wrap">
      <h1>競輪レース結果</h1>
      <div class="summary">
        <div class="metric"><span>表示日</span><strong>-</strong></div>
        <div class="metric"><span>累計レース</span><strong>0</strong></div>
        <div class="metric"><span>選手結果</span><strong>0</strong></div>
        <div class="metric"><span>払戻</span><strong>0</strong></div>
      </div>
    </div>
  </header>
  <main>
    <div class="wrap">
      <div class="toolbar">
        <span>0レース / generated at 2026-06-09 22:47:11</span>
        <input id="filter" type="search" placeholder="会場名で絞り込み">
      </div>
      
      <section class="empty">
        <h2>表示できるレース結果はまだありません</h2>
        <p>次回の自動取得後にここへ結果が表示されます。</p>
      </section>
    
    </div>
  </main>
  <script>
    const input = document.getElementById("filter");
    const races = Array.from(document.querySelectorAll(".race"));
    input.addEventListener("input", () => {
      const keyword = input.value.trim();
      for (const race of races) {
        race.hidden = keyword && !race.dataset.venue.includes(keyword);
      }
    });
  </script>
</body>
</html>
