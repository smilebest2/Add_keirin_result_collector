<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>独自ランキング | 競輪統計</title>
  <style>
    :root {
      --bg: #f5f7f9;
      --panel: #ffffff;
      --ink: #20242a;
      --muted: #697586;
      --line: #dbe1e8;
      --accent: #0f766e;
      --accent-2: #1d4ed8;
      --accent-3: #b45309;
      --soft: #e0f2ef;
      --soft-2: #e8eefc;
      --warn: #fef3c7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 18px 20px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      letter-spacing: 0;
    }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    nav a {
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      padding: 7px 10px;
      text-decoration: none;
      font-size: 14px;
      background: #fbfcfd;
    }
    nav a.active {
      border-color: var(--accent);
      background: var(--soft);
      color: var(--accent);
      font-weight: 700;
    }
    main .wrap {
      display: grid;
      gap: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 12px;
    }
    .grid.two {
      grid-template-columns: repeat(2, minmax(240px, 1fr));
    }
    .card, section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .card {
      padding: 14px;
    }
    .card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }
    .card strong {
      display: block;
      margin-top: 3px;
      font-size: 22px;
    }
    section h2 {
      margin: 0;
      padding: 13px 15px;
      border-bottom: 1px solid var(--line);
      font-size: 17px;
      background: #fafbfc;
      letter-spacing: 0;
    }
    .section-lead {
      margin: 12px 15px 0;
      color: var(--muted);
      font-size: 13px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }
    th {
      color: var(--muted);
      background: #fbfcfd;
      font-weight: 700;
    }
    .empty {
      padding: 22px;
      color: var(--muted);
      text-align: center;
    }
    .chart {
      display: grid;
      gap: 9px;
      padding: 14px 15px 16px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: minmax(92px, 170px) minmax(160px, 1fr) 92px;
      gap: 10px;
      align-items: center;
      font-size: 13px;
    }
    .bar-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bar-track {
      height: 12px;
      border-radius: 999px;
      background: #eef2f6;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      min-width: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }
    .bar-value {
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }
    .heatmap {
      padding: 0 0 2px;
      overflow-x: auto;
    }
    .heatmap td {
      min-width: 58px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .heat-0 { background: #f8fafc; }
    .heat-1 { background: #e8f4f1; }
    .heat-2 { background: #cbe9e2; }
    .heat-3 { background: #94d6c8; }
    .heat-4 { background: #4eb7a2; color: #062f29; font-weight: 700; }
    .note {
      padding: 12px 15px;
      color: var(--muted);
      background: #fbfcfd;
      border-top: 1px solid var(--line);
      font-size: 13px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 15px 16px;
    }
    .action-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #ffffff;
      padding: 8px 12px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }
    .action-button.secondary {
      border-color: #b91c1c;
      background: #b91c1c;
    }
    @media (max-width: 780px) {
      .grid, .grid.two { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      section { overflow-x: auto; }
      table { min-width: 760px; }
      .bar-row { grid-template-columns: 96px minmax(130px, 1fr) 74px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
