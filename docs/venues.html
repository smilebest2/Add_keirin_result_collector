<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>会場分析 | 競輪統計</title>
  <style>
    :root {
      --bg: #f5f7f9;
      --panel: #ffffff;
      --ink: #20242a;
      --muted: #697586;
      --line: #dbe1e8;
      --accent: #0f766e;
      --accent-soft: #e0f2ef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 20px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      letter-spacing: 0;
    }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    nav a {
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      padding: 7px 10px;
      text-decoration: none;
      font-size: 14px;
      background: #fbfcfd;
    }
    nav a.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
    }
    main .wrap {
      display: grid;
      gap: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 12px;
    }
    .card, section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .card {
      padding: 14px;
    }
    .card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }
    .card strong {
      display: block;
      margin-top: 3px;
      font-size: 22px;
    }
    section h2 {
      margin: 0;
      padding: 13px 15px;
      border-bottom: 1px solid var(--line);
      font-size: 17px;
      background: #fafbfc;
      letter-spacing: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      background: #fbfcfd;
      font-weight: 700;
    }
    .empty {
      padding: 22px;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 780px) {
      .grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      section { overflow-x: auto; }
      table { min-width: 720px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>会場分析</h1>
      <nav><a class="" href="index.html">TOP</a><a class="active" href="venues.html">会場分析</a><a class="" href="car_numbers.html">車番分析</a><a class="" href="payouts.html">配当分析</a><a class="" href="racers.html">選手分析</a><a class="" href="custom.html">独自ランキング</a></nav>
    </div>
  </header>
  <main>
    <div class="wrap">
      <section><h2>会場別平均タイム</h2><div class="empty">データがありません</div></section><section><h2>会場別 3連単平均配当・高配当率</h2><div class="empty">データがありません</div></section><section><h2>会場別荒れ度ランキング</h2><div class="empty">データがありません</div></section><section><h2>会場別車番傾向</h2><div class="empty">データがありません</div></section>
    </div>
  </main>
</body>
</html>
