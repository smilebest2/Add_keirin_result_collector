<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>レース詳細 | 競輪統計</title>
  <style>
    :root {
      --bg: #f5f7f9;
      --panel: #ffffff;
      --ink: #20242a;
      --muted: #697586;
      --line: #dbe1e8;
      --accent: #0f766e;
      --accent-2: #1d4ed8;
      --accent-3: #b45309;
      --soft: #e0f2ef;
      --soft-2: #e8eefc;
      --warn: #fef3c7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 18px 20px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      letter-spacing: 0;
    }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    nav a {
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      padding: 7px 10px;
      text-decoration: none;
      font-size: 14px;
      background: #fbfcfd;
    }
    nav a.active {
      border-color: var(--accent);
      background: var(--soft);
      color: var(--accent);
      font-weight: 700;
    }
    main .wrap {
      display: grid;
      gap: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 12px;
    }
    .grid.two {
      grid-template-columns: repeat(2, minmax(240px, 1fr));
    }
    .card, section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .card {
      padding: 14px;
    }
    .card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }
    .card strong {
      display: block;
      margin-top: 3px;
      font-size: 22px;
    }
    section h2 {
      margin: 0;
      padding: 13px 15px;
      border-bottom: 1px solid var(--line);
      font-size: 17px;
      background: #fafbfc;
      letter-spacing: 0;
    }
    .section-lead {
      margin: 12px 15px 0;
      color: var(--muted);
      font-size: 13px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }
    th {
      color: var(--muted);
      background: #fbfcfd;
      font-weight: 700;
    }
    .empty {
      padding: 22px;
      color: var(--muted);
      text-align: center;
    }
    .chart {
      display: grid;
      gap: 9px;
      padding: 14px 15px 16px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: minmax(92px, 170px) minmax(160px, 1fr) 92px;
      gap: 10px;
      align-items: center;
      font-size: 13px;
    }
    .bar-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bar-track {
      height: 12px;
      border-radius: 999px;
      background: #eef2f6;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      min-width: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }
    .bar-value {
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }
    .heatmap {
      padding: 0 0 2px;
      overflow-x: auto;
    }
    .heatmap td {
      min-width: 58px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .heat-0 { background: #f8fafc; }
    .heat-1 { background: #e8f4f1; }
    .heat-2 { background: #cbe9e2; }
    .heat-3 { background: #94d6c8; }
    .heat-4 { background: #4eb7a2; color: #062f29; font-weight: 700; }
    .note {
      padding: 12px 15px;
      color: var(--muted);
      background: #fbfcfd;
      border-top: 1px solid var(--line);
      font-size: 13px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 15px 16px;
    }
    .action-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #ffffff;
      padding: 8px 12px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }
    .action-button.secondary {
      border-color: #b91c1c;
      background: #b91c1c;
    }
    .detail-link {
      color: var(--accent-2);
      font-weight: 700;
      text-decoration: none;
    }
    .detail-link:hover {
      text-decoration: underline;
    }
    .rank-note {
      padding: 12px 15px;
      color: var(--muted);
      font-size: 13px;
      background: #fbfcfd;
      border-bottom: 1px solid var(--line);
    }
    .ranking-more {
      border-top: 1px solid var(--line);
    }
    .ranking-more summary {
      cursor: pointer;
      padding: 11px 15px;
      color: var(--accent-2);
      font-size: 13px;
      font-weight: 700;
      background: #fbfcfd;
      list-style-position: inside;
    }
    @media (max-width: 780px) {
      .grid, .grid.two { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      section { overflow-x: auto; }
      table { min-width: 760px; }
      .bar-row { grid-template-columns: 96px minmax(130px, 1fr) 74px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>レース詳細</h1>
      <nav><a class="" href="index.html">TOP</a><a class="" href="venues.html">会場分析</a><a class="" href="car_numbers.html">車番分析</a><a class="" href="payouts.html">配当分析</a><a class="" href="racers.html">選手分析</a><a class="active" href="races.html">レース一覧</a><a class="" href="quality.html">データ品質</a><a class="" href="custom.html">独自ランキング</a></nav>
    </div>
  </header>
  <main>
    <div class="wrap">
      
    <section>
      <h2 id="detail-title">レース詳細</h2>
      <div id="race-detail-root"><div class="empty">読み込み中です</div></div>
    </section>
    <script>
    (() => {
      const root = document.getElementById("race-detail-root");
      const title = document.getElementById("detail-title");
      const params = new URLSearchParams(window.location.search);
      const raceId = params.get("race_id") || "";
      const date = params.get("date") || raceId.split("_")[0] || "";

      const esc = (value) => {
        if (value === null || value === undefined) return "";
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[char]));
      };
      const yen = (value) => {
        if (value === null || value === undefined || value === "") return "";
        return `${Number(value).toLocaleString("ja-JP")}円`;
      };
      const card = (label, value) => `<div class="card"><span>${esc(label)}</span><strong>${esc(value || "-")}</strong></div>`;
      const table = (headers, rows, fields) => {
        if (!rows || rows.length === 0) return '<div class="empty">データがありません</div>';
        const head = headers.map((header) => `<th>${esc(header)}</th>`).join("");
        const body = rows.map((row) => `<tr>${fields.map((field) => `<td>${esc(row[field])}</td>`).join("")}</tr>`).join("");
        return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
      };
      const section = (heading, content) => `<section><h2>${esc(heading)}</h2>${content}</section>`;

      if (!raceId || !date) {
        root.innerHTML = '<div class="empty">race_id が指定されていません</div>';
        return;
      }

      fetch(`data/race_details/${date}.json`, { cache: "no-store" })
        .then((response) => {
          if (!response.ok) throw new Error("detail json not found");
          return response.json();
        })
        .then((items) => {
          const item = items.find((entry) => entry.race && entry.race.race_id === raceId);
          if (!item) {
            root.innerHTML = '<div class="empty">該当レースが見つかりません</div>';
            return;
          }
          const race = item.race;
          const payouts = (item.payouts || []).map((row) => ({ ...row, payout_display: yen(row.payout) }));
          title.textContent = `${race.race_date || ""} ${race.venue || ""} ${race.race_no || ""}R`;
          const cards = [
            card("日付", race.race_date),
            card("会場", race.venue),
            card("レース", race.race_no ? `${race.race_no}R` : ""),
            card("発走", race.start_time),
            card("距離", race.distance ? `${race.distance}m` : ""),
            card("天候", race.weather),
            card("風速", race.wind_speed !== null && race.wind_speed !== undefined ? `${race.wind_speed}m/s` : ""),
            card("級班", race.race_class)
          ].join("");
          const infoRows = [
            { name: "開催", value: race.event_name },
            { name: "レース名", value: race.race_title },
            { name: "締切", value: race.deadline_time },
            { name: "状態", value: race.status },
            { name: "周回", value: race.laps },
            { name: "気温", value: race.temperature !== null && race.temperature !== undefined ? `${race.temperature}℃` : "" },
            { name: "風向", value: race.wind_direction },
            { name: "並び", value: race.lineup_text },
            { name: "コメント", value: race.race_comment }
          ];
          root.innerHTML = `
            <div class="grid">${cards}</div>
            ${section("レース情報", table(["項目", "値"], infoRows, ["name", "value"]))}
            <div class="grid two">
              ${section("着順", table(["着順", "車番", "選手", "級班", "府県", "年齢", "期", "着差", "上り", "決まり手", "S", "B"], item.results || [], ["rank", "car_no", "racer_name", "class", "prefecture", "age", "term", "margin", "time", "kimarite", "start_mark", "back_mark"]))}
              ${section("払戻", table(["賭式", "組番", "払戻", "人気"], payouts, ["bet_type", "combination", "payout_display", "popularity"]))}
            </div>
            ${section("並び詳細", table(["ライン", "位置", "車番"], item.lineup || [], ["line_no", "line_position", "car_no"]))}
          `;
        })
        .catch(() => {
          root.innerHTML = '<div class="empty">詳細データを読み込めませんでした</div>';
        });
    })();
    </script>
    
    </div>
  </main>
</body>
</html>
