name: Reset Keirin Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reset:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Delete collected data
        run: |
          rm -f data/keirin.db
          rm -f logs/collector.log
          rm -f logs/error.log
          rm -f logs/results_rendered.html

      - name: Generate empty analytics pages
        run: python -m src.analysis

      - name: Commit reset data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Reset collected keirin data"
          file_pattern: .
