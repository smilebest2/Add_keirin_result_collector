name: Collect Keirin Results

on:
  schedule:
    # 07:30 JST. GitHub Actions scheduled runs can be delayed during busy periods.
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    concurrency:
      group: collect-keirin-results
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Collect results
        run: python -m src.scraper

      - name: Collect racecards
        run: python -m src.schedule

      - name: Build line features
        run: python -m src.lineup_features

      - name: Generate predictions
        env:
          SITE_ENV: ${{ vars.SITE_ENV }}
        run: python -m src.prediction

      - name: Export analytics pages
        env:
          SITE_ENV: ${{ vars.SITE_ENV }}
        run: python -m src.analysis

      - name: Commit collected data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Collect keirin race results"
          file_pattern: data/keirin.db docs/*.html docs/.nojekyll docs/data/race_details/*.json logs/*.log logs/*.html
