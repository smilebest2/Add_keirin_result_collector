name: Collect Keirin Results

on:
  push:
    branches:
      - main
  schedule:
    - cron: "50 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Wait 5 minutes after push
        if: github.event_name == 'push'
        run: sleep 300

      - name: Collect results
        run: python -m src.scraper

      - name: Export analytics pages
        run: python -m src.analysis

      - name: Commit collected data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Collect keirin race results"
          file_pattern: data/keirin.db docs/*.html docs/.nojekyll logs/*.log logs/*.html
