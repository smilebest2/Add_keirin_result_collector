name: Collect Keirin Results

on:
  schedule:
    - cron: "50 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect results
        run: python -m src.scraper

      - name: Export homepage
        run: python -m src.export_html

      - name: Commit collected data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Collect keirin race results"
          file_pattern: data/keirin.db docs/index.html docs/.nojekyll logs/*.log
